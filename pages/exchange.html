<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Exchange</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="../index.html"><img src="../images/logo.svg" alt="Logo" width="30" height="30"> Community Skill Exchange</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="dashboard.html">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="skills.html">Skills</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="exchange.html">Exchange</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="messages.html">Messages</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="profile.html">Profile</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="login.html">Login</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container mt-5">
        <h1>Skill Exchange</h1>
        <p>Propose a skill exchange or view offers from other users.</p>

        <form id="exchangeForm">
            <div class="form-group">
                <label for="yourSkill">Your Skill</label>
                <input type="text" class="form-control" id="yourSkill" placeholder="Enter your skill" required>
            </div>
            <div class="form-group">
                <label for="desiredSkill">Desired Skill</label>
                <input type="text" class="form-control" id="desiredSkill" placeholder="Enter the skill you want" required>
            </div>
            <div class="form-group">
                <label for="message">Message to Offer</label>
                <textarea class="form-control" id="message" rows="3" placeholder="Enter your message" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Propose Exchange</button>
        </form>

        <div id="exchangeOffers" class="mt-5">
            <h2>Current Exchange Offers</h2>
            <ul class="list-group">
                <!-- Exchange offers will be dynamically populated here -->
            </ul>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/validation.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
